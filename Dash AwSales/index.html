<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=0.8" />
    <title>AwSales Dashboard - Preview</title>
    <style>
      :root {
        --color-background-primary: #ffffff;
        --color-background-secondary: #f5f5f7;
        --color-text-primary: #1d1d1f;
        --color-text-secondary: #424245;
        --color-text-tertiary: #86868b;
        --color-border-secondary: rgba(0,0,0,0.1);
        --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --color-background-primary: #000000;
          --color-background-secondary: #1c1c1e;
          --color-text-primary: #f5f5f7;
          --color-text-secondary: #a1a1a6;
          --color-text-tertiary: #86868b;
          --color-border-secondary: rgba(255,255,255,0.1);
        }
      }
      body { margin: 0; background-color: var(--color-background-primary); color: var(--color-text-primary); font-family: var(--font-sans); }
      #root { width: 100%; min-height: 100vh; }
      .loading { display: flex; align-items: center; justify-content: center; height: 100vh; font-size: 18px; color: var(--color-text-tertiary); }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading">Carregando painel via Vite...</div>
    </div>
    <script type="module" src="./main.jsx"></script>
  </body>
</html>
